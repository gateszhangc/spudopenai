apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: spudopenai
  namespace: argocd
spec:
  description: Spud OpenAI application managed from the application repository.
  sourceRepos:
    - https://github.com/gateszhangc/spudopenai.git
  destinations:
    - namespace: spudopenai
      server: https://kubernetes.default.svc
  clusterResourceWhitelist:
    - group: "*"
      kind: "*"
  namespaceResourceWhitelist:
    - group: "*"
      kind: "*"

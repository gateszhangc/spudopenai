apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: spudopenai
  namespace: argocd
spec:
  project: spudopenai
  source:
    repoURL: https://github.com/gateszhangc/spudopenai.git
    targetRevision: main
    path: deploy/k8s/overlays/prod
  destination:
    server: https://kubernetes.default.svc
    namespace: spudopenai
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
